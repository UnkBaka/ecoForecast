{% extends "base.html" %}
{% block content %}
<div class="container" style="margin-top: 100px; margin-bottom: 80px;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 text-center" style="background: rgba(10, 25, 47, 0.85); color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 15px;">
                <div class="card-body p-5">
                    <i class="bi bi-envelope-paper text-white" style="font-size: 3rem;"></i>
                    <h1 class="fw-bold my-4" style="color: #3498db;">Get in Touch</h1>
                    <p class="lead mb-4">Have a question about the AI model, found a bug, or want to discuss collaboration?</p>

                    <hr style="border-color: rgba(255,255,255,0.2); width: 50%; margin: 0 auto 30px auto;">

                    <p class="mb-2" style="font-size: 1.1rem;">Please email the address below:</p>
                    <h3 class="fw-bold mb-5" style="color: #2ecc71;">support@ecoforecast.com</h3>

                    <p style="color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; margin-bottom: 0;">
                        <i class="bi bi-github"></i> Source Code: <a href="#" style="color: #3498db; text-decoration: none;">GitHub link coming soon</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
