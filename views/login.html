{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-dark text-white text-center p-4 rounded-top-4">
                    <i class="bi bi-shield-lock-fill display-4 text-warning"></i>
                    <h4 class="mt-3 mb-0 fw-bold">Admin Portal</h4>
                    <small class="text-muted">Restricted Access</small>
                </div>
                <div class="card-body p-4 bg-white rounded-bottom-4">

                    {% if error %}
                    <div class="alert alert-danger py-2 text-center shadow-sm" style="font-size: 0.9rem;">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST" action="/login">
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small">Access Key</label>
                            <input type="password" name="password" class="form-control form-control-lg text-center bg-light" placeholder="••••••••" required autofocus style="letter-spacing: 2px;">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold shadow-sm">
                            <i class="bi bi-unlock-fill me-2"></i> Unlock
                        </button>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
