<!DOCTYPE html>
<html>
<head>
    <title>EcoForecast | Admin Panel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Poppins', sans-serif;
        }

        /* Fixed Sidebar - Always stays on top */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            height: 100%;
            background: #2c3e50;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            z-index: 2000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .sidebar-content {
            flex-grow: 1;
            overflow-y: auto;
        }

        /* Map Container - Pushed to the right by the sidebar width */
        #adminMap {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 320px;
            z-index: 1;
            background: #eee;
        }

        /* Scrollbar styling for sidebar */
        .sidebar-content::-webkit-scrollbar { width: 6px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-content">
            <h2>🛠 Admin Panel</h2>
            <p style="font-size: 0.8rem; opacity: 0.7;">EcoForecast System Manager</p>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

            <h4>Deploy New Station</h4>
            <input type="text" id="city_name" placeholder="Station Name..." autocomplete="off"
                   style="width:100%; padding:10px; border-radius:4px; border:none; margin-bottom:10px; box-sizing: border-box;">

            <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; margin-bottom: 15px;">
                <small>Coordinates:</small><br>
                <span id="coords" style="font-family: monospace; color: #f1c40f; font-weight: bold;">Click map to select!</span>
            </div>

            <button onclick="saveCity()"
                    style="background: #27ae60; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s;">
                ➕ Add Location
            </button>

            <div class="city-list" style="margin-top: 30px;">
                <small style="text-transform: uppercase; letter-spacing: 1px; opacity: 0.6;">Active Locations</small>
                <ul id="active-list" style="list-style: none; padding: 0; margin-top: 10px;">
                    {% for city in cities %}
                    <li style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <span>📍 {{ city[0] }}</span>
                        <button onclick="deleteCity('{{ city[0] }}')" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-size: 1.1rem;" title="Delete Station">✕</button>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <hr style="border-color: rgba(255,255,255,0.1); margin-bottom: 15px;">
            <a href="/logout" style="width: 100%; padding: 10px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; text-align: center; text-decoration: none; display: block; box-sizing: border-box;">
                🚪 Logout Dashboard
            </a>
        </div>
    </div>

    <div id="adminMap"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // Initialize Map
    var map = L.map('adminMap').setView([4.2105, 101.9758], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    setTimeout(() => map.invalidateSize(), 500);
    window.addEventListener('resize', () => map.invalidateSize());

    // 1. RENDER EXISTING CITIES (BLUE PINS)
    const existingCities = [
        {% for city in cities %}
            { name: "{{ city[0] }}", lat: {{ city[1] }}, lng: {{ city[2] }} },
        {% endfor %}
    ];

    existingCities.forEach(city => {
        L.marker([city.lat, city.lng])
         .addTo(map)
         .bindPopup(`<b style="font-size:14px;">${city.name}</b><br><span style="color:green;">🟢 Active Station</span>`);
    });

    // 2. RED PIN SETUP FOR NEW CLICKS
    var redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    // DECLARE ONCE
    let selected = null;
    let clickMarker = null;

    map.on('click', function(e) {
        selected = e.latlng;
        if(clickMarker) map.removeLayer(clickMarker);
        clickMarker = L.marker(selected, {icon: redIcon}).addTo(map);
        document.getElementById('coords').innerText = selected.lat.toFixed(4) + ", " + selected.lng.toFixed(4);
    });

    // 3. DATABASE FUNCTIONS
    function saveCity() {
        const name = document.getElementById('city_name').value;
        if(!name || !selected) return alert("Please enter a station name and click a location on the map!");

        fetch('/admin/add_city', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name, lat: selected.lat, lng: selected.lng })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'error') alert("Error: " + data.message);
            else { alert(data.message); location.reload(); }
        })
        .catch(err => alert("Failed to add city. Check console."));
    }

    function deleteCity(cityName) {
        if(!confirm(`Delete "${cityName}" permanently?`)) return;

        fetch('/admin/delete_city', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: cityName })
        })
        .then(res => res.json())
        .then(data => {
            if(data.error) alert("Error: " + data.error);
            else { alert(data.message); location.reload(); }
        })
        .catch(err => alert("Failed to delete city."));
    }
</script>
</body>
</html>
