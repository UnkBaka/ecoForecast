<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoForecast | Malaysia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-cloud-haze2-fill me-2"></i>
                <span class="fw-bold text-uppercase tracking-wider">EcoForecast</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#ecoNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="ecoNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/">
                            <i class="bi bi-house-door"></i> Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-3" href="{{ url_for('aqi.run') }}">
                            <i class="bi bi-wind"></i> AQI Report
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-3" href="/results">
                            <i class="bi bi-clipboard-data"></i> AI & Data Analysis
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-3" href="/footprint">
                            <i class="bi bi-tree"></i> Carbon Footprint
                        </a>
                    </li>
                </ul>

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/aqi">Live AQI</a></li>

                    {% if session.get('admin_logged_in') %}
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-danger btn-sm mt-1" href="/logout">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="full-screen-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-auto py-3 bg-dark text-white text-center">
        <div class="container d-flex justify-content-between align-items-center">
        <span class="text-muted small">© 2026 EcoForecast | Malaysian Weather Intelligence</span>

        <a href="/login" class="text-muted text-decoration-none small" title="Admin Portal">
            <i class="bi bi-shield-lock"></i> Admin
        </a>
    </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
